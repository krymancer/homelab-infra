apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      restartPolicy: Always
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: docker-sock
          emptyDir: {}
        - name: config
          configMap:
            name: forgejo-runner-config
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.2.2
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /data/.runner ]; then
                echo "Runner already registered"
                exit 0
              fi
              forgejo-runner register \
                --no-interactive \
                --name "k3s-runner" \
                --instance "http://forgejo.forgejo.svc.cluster.local:3000" \
                --token "$RUNNER_TOKEN"
          env:
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-token
                  key: token
          workingDir: /data
          volumeMounts:
            - name: runner-data
              mountPath: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.2.2
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              while [ ! -S /sock/docker.sock ]; do
                echo "Waiting for Docker socket..."
                sleep 2
              done
              exec forgejo-runner daemon --config /config/config.yml
          env:
            - name: DOCKER_HOST
              value: unix:///sock/docker.sock
          workingDir: /data
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: docker-sock
              mountPath: /sock
            - name: config
              mountPath: /config
        - name: dind
          image: docker:24-dind
          securityContext:
            privileged: true
          command:
            - dockerd
            - --host=unix:///sock/docker.sock
            - --tls=false
            - --insecure-registry=192.168.0.20:30300
          volumeMounts:
            - name: docker-sock
              mountPath: /sock
